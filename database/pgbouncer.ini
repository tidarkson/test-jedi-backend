[databases]
# Source database (Prisma will connect through PgBouncer on port 6432)
test_jedi_dev = host=postgres port=5432 dbname=test_jedi_dev

[pgbouncer]
# Listening port for application connections
listen_addr = 0.0.0.0
listen_port = 6432

# Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# Pool mode
# transaction mode: safe for Node.js / Prisma with prepared statement cache disabled
pool_mode = transaction

# Pool sizing
# max_client_conn: 500 concurrent app connections (matches NFR: 500 concurrent testers)
max_client_conn = 600

# default_pool_size: server connections per db/user pair
# Sized to match Prisma's max pool (20) × expected number of app server instances (3)
default_pool_size = 20
max_db_connections = 60

# Reserve 10 connections for admin / monitoring
reserve_pool_size = 10
reserve_pool_timeout = 5

# Connection timeouts
server_connect_timeout = 15
server_idle_timeout = 600
client_idle_timeout = 0
server_lifetime = 3600

# Keep idle connections warm
min_pool_size = 5

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

# Admin interface
admin_users = postgres
stats_users = postgres

# TLS (uncomment and configure for production)
# server_tls_sslmode = require
# server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt
