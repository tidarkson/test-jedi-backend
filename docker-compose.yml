version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: test-jedi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_jedi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-jedi-network

  # -------------------------------------------------------
  # PgBouncer - Connection pooling (NFR: 500 concurrent testers)
  # App connects to localhost:6432 instead of localhost:5432
  # Set DATABASE_URL=postgresql://postgres:postgres@localhost:6432/test_jedi_dev
  # -------------------------------------------------------
  pgbouncer:
    image: pgbouncer/pgbouncer:1.22.1
    container_name: test-jedi-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_USER: postgres
      DATABASES_PASSWORD: postgres
      DATABASES_DBNAME: test_jedi_dev
      PGBOUNCER_LISTEN_PORT: "6432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "600"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_MAX_DB_CONNECTIONS: "60"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_AUTH_TYPE: plain
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-jedi-network

  redis:
    image: redis:7-alpine
    container_name: test-jedi-redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-jedi-network

volumes:
  postgres_data:

networks:
  test-jedi-network:
    driver: bridge
